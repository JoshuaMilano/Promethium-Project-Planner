{% extends "layout.html" %}
{% block body %}
    <main class="container py-5 text-center">
        <div class="prm-boards-container">
            <div class="prm-boards-list">
                {% for board in users_boards %}
                    <a class="prm-button" href="/board/{{ board.id }}">{{ board.title }}</a>
                {% endfor %}
                <form action="/create_board" method="post">
                    <button class="prm-button" type="submit">Create new board</button>
                </form>
            </div>
            <div class="prm-board"></div>
        </div>
    </main>
{% endblock %}
