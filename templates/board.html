{% extends "layout.html" %}
{% block body %}
    <main class="container py-5 text-center">
        <div class="prm-boards-container">
            <div class="prm-boards-list">
                {% for board in users_boards %}
                    <a href="/board/{{ board.id }}">{{ board.title }}</a>
                {% endfor %}
                <form action="/create_board" method="post">
                    <button class="create-board-btn" type="submit">Create new board</button>
                </form>
            </div>
            <div class="prm-board">
                <div class="prm-board-title">
                    <h1>{{ active_board.title }}</h1>
                </div>
            </div>
        </div>
    </main>
    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
{% endblock %}
