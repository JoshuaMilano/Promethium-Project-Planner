{% extends "layout.html" %}
{% block body %}
    <main class="container py-5 text-center">
        <h1 class="mb-3">Register</h1>
        <form action="/register" method="post">
            <div class="mb-3">
                <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="username" placeholder="Username" type="text">
            </div>
            <div class="mb-3">
                <input autocomplete="off" class="form-control mx-auto w-auto" name="password" placeholder="Password" type="password">
            </div>
                <div class="mb-3">
            <input autocomplete="off" class="form-control mx-auto w-auto" name="password-confirmation" placeholder="Confirm password" type="password">
            </div>
            <button class="btn btn-primary" type="submit">Register</button>
        </form>
    </main>
{% endblock %}
